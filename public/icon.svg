<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F8" />
      <stop offset="50%" stop-color="#FDF0EE" />
      <stop offset="100%" stop-color="#FCE4EC" />
    </linearGradient>
    <linearGradient id="goldPinkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D81B60" />
      <stop offset="50%" stop-color="#FF8A80" />
      <stop offset="100%" stop-color="#FFD54F" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#D81B60" flood-opacity="0.15" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#D81B60" stroke-width="4" stroke-opacity="0.1" stroke-dasharray="16 12" />
  
  <!-- Main Emblem Group with Shadow -->
  <g filter="url(#dropShadow)">
    <!-- Shield / Heart Base -->
    <path d="M256,90 C256,90 390,130 390,240 C390,340 286,410 256,422 C226,410 122,340 122,240 C122,130 256,90 256,90 Z" fill="url(#goldPinkGrad)" />
    
    <!-- Inner Shield for contrast -->
    <path d="M256,108 C256,108 372,143 372,240 C372,326 282,388 256,398 C230,388 140,326 140,240 C140,143 256,108 256,108 Z" fill="#FFF9F8" opacity="0.95" />
    
    <!-- Elegant heart icon in the center -->
    <path d="M256,190 C264,170 290,160 310,180 C332,202 310,246 256,290 C202,246 180,202 202,180 C222,160 248,170 256,190 Z" fill="url(#goldPinkGrad)" filter="url(#glow)" />
    
    <!-- Stylized Wings / Butterfly Motif for Menstrual/Wellness transformation -->
    <path d="M256,230 C276,210 320,210 330,235 C340,260 296,280 256,310 C216,280 172,260 182,235 C192,210 236,210 256,230 Z" fill="url(#goldPinkGrad)" opacity="0.85" />
    
    <!-- Small elegant star/sparkle at the top -->
    <path d="M256,128 L260,138 L270,140 L260,142 L256,152 L252,142 L242,140 L252,138 Z" fill="#FFD54F" />
  </g>
</svg>
